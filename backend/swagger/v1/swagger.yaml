---
openapi: 3.0.1
info:
  title: CatalogIt API
  version: v1
  description: API for managing cataloging lists and items. Organize your collections
    with ease.
  contact:
    name: CatalogIt Support
    url: https://github.com/JellyWang7/catalog-it
paths:
  "/api/v1/lists/{list_id}/items":
    parameters:
    - name: list_id
      in: path
      description: List ID
      required: true
      schema:
        type: integer
    get:
      summary: List all items in a list
      tags:
      - Items
      description: Retrieves all items belonging to a specific list
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/Item"
        '404':
          description: list not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a new item in a list
      tags:
      - Items
      description: Creates a new item in a specific list
      parameters: []
      responses:
        '201':
          description: item created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Item"
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: list not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                item:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                  required:
                  - title
              required:
              - item
  "/api/v1/items/{id}":
    parameters:
    - name: id
      in: path
      description: Item ID
      required: true
      schema:
        type: integer
    get:
      summary: Show a specific item
      tags:
      - Items
      description: Retrieves a specific item
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Item"
        '404':
          description: item not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Update an item
      tags:
      - Items
      description: Updates an existing item
      parameters: []
      responses:
        '200':
          description: item updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Item"
        '404':
          description: item not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                item:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
              required:
              - item
    delete:
      summary: Delete an item
      tags:
      - Items
      description: Deletes a specific item
      responses:
        '204':
          description: item deleted
        '404':
          description: item not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/lists":
    get:
      summary: List all public lists
      tags:
      - Lists
      description: Retrieves all public lists with their associated items
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    description:
                      type: string
                      nullable: true
                    is_public:
                      type: boolean
                    user_id:
                      type: integer
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time
                    items:
                      type: array
                      items:
                        "$ref": "#/components/schemas/Item"
    post:
      summary: Create a new list
      tags:
      - Lists
      description: Creates a new list
      parameters: []
      responses:
        '201':
          description: list created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/List"
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                list:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    is_public:
                      type: boolean
                    user_id:
                      type: integer
                  required:
                  - title
                  - user_id
              required:
              - list
  "/api/v1/lists/{id}":
    parameters:
    - name: id
      in: path
      description: List ID
      required: true
      schema:
        type: integer
    get:
      summary: Show a specific list
      tags:
      - Lists
      description: Retrieves a specific list with all its items
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  description:
                    type: string
                    nullable: true
                  is_public:
                    type: boolean
                  user_id:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                  items:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Item"
        '404':
          description: list not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Update a list
      tags:
      - Lists
      description: Updates an existing list
      parameters: []
      responses:
        '200':
          description: list updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/List"
        '404':
          description: list not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                list:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    is_public:
                      type: boolean
              required:
              - list
    delete:
      summary: Delete a list
      tags:
      - Lists
      description: Deletes a list and all its items
      responses:
        '204':
          description: list deleted
        '404':
          description: list not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/lists/{list_id}/attachments":
    parameters:
    - name: list_id
      in: path
      description: List ID
      required: true
      schema:
        type: integer
    get:
      summary: List all attachments on a list
      tags:
      - Attachments
      description: Returns list-level attachments when list visibility allows access
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/Attachment"
        '403':
          description: not authorized to view attachments
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: list not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create list attachment
      tags:
      - Attachments
      description: Adds a link/file/image attachment to a list (owner only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              "$ref": "#/components/schemas/AttachmentCreateRequest"
      responses:
        '201':
          description: attachment created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Attachment"
        '401':
          description: authentication required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '403':
          description: not authorized to create attachment
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/items/{item_id}/attachments":
    parameters:
    - name: item_id
      in: path
      description: Item ID
      required: true
      schema:
        type: integer
    get:
      summary: List all attachments on an item
      tags:
      - Attachments
      description: Returns item-level attachments when parent list visibility allows access
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/Attachment"
        '403':
          description: not authorized to view attachments
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: item not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create item attachment
      tags:
      - Attachments
      description: Adds a link/file/image attachment to an item (owner only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              "$ref": "#/components/schemas/AttachmentCreateRequest"
      responses:
        '201':
          description: attachment created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Attachment"
        '401':
          description: authentication required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '403':
          description: not authorized to create attachment
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/attachments/{id}":
    parameters:
    - name: id
      in: path
      description: Attachment ID
      required: true
      schema:
        type: integer
    delete:
      summary: Delete attachment
      tags:
      - Attachments
      description: Deletes an attachment (list owner only)
      responses:
        '204':
          description: attachment deleted
        '401':
          description: authentication required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '403':
          description: not authorized to delete attachment
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: attachment not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
servers:
- url: http://localhost:3000
  description: Development server
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: api.catalogit.com
  description: Production server
components:
  schemas:
    List:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        is_public:
          type: boolean
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - title
      - is_public
      - user_id
    Item:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        list_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - title
      - list_id
    Attachment:
      type: object
      properties:
        id:
          type: integer
        kind:
          type: string
          enum:
          - link
          - image
          - file
        title:
          type: string
        url:
          type: string
          nullable: true
        mime_type:
          type: string
          nullable: true
        size_bytes:
          type: integer
          nullable: true
        attachable_type:
          type: string
          nullable: true
        attachable_id:
          type: integer
          nullable: true
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - kind
      - title
      - user_id
    AttachmentCreateRequest:
      type: object
      properties:
        attachment[kind]:
          type: string
          enum:
          - link
          - image
          - file
        attachment[title]:
          type: string
        attachment[url]:
          type: string
          nullable: true
          description: Required for link attachments and must be https://
        attachment[asset]:
          type: string
          format: binary
          nullable: true
          description: Required for file/image uploads; max 5MB
      required:
      - attachment[kind]
      - attachment[title]
    Error:
      type: object
      properties:
        error:
          type: string
